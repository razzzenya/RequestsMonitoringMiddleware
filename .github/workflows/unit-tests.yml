name: Unit tests

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master, development]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore RequestMonitoring.Tests/RequestMonitoring.Tests.csproj

      - name: Build
        run: dotnet build RequestMonitoring.Tests/RequestMonitoring.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: >
          dotnet test RequestMonitoring.Tests/RequestMonitoring.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~QuotaServiceTests"
          --logger "console;verbosity=normal"
